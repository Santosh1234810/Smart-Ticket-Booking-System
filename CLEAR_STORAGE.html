<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage</title>
</head>
<body>
    <h1>Clear Storage</h1>
    <button onclick="clearStorage()">Clear All Storage</button>
    <p id="status"></p>
    
    <script>
        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('status').textContent = 'Storage cleared! You can now refresh the app and try booking again.';
        }
    </script>
</body>
</html>
